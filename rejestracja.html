<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja - menele.eu</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-box {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 350px;
        }

        .auth-box h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .auth-btn {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .auth-btn:hover {
            background: #5568d3;
        }

        .auth-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .message {
            text-align: center;
            margin-bottom: 15px;
            font-size: 13px;
            padding: 8px;
            border-radius: 4px;
            display: none;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }

        .auth-link {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #666;
        }

        .auth-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link {
            margin-bottom: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="back-link">
                <a href="index.html">← Powrót</a>
            </div>
            
            <h1>Rejestracja</h1>

            <div id="message" class="message"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Imię i nazwisko:</label>
                    <input type="text" id="name" name="name" required placeholder="Jan Kowalski">
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="email@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Hasło:</label>
                    <input type="password" id="password" name="password" required placeholder="Min. 8 znaków">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Potwierdź hasło:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Powtórz hasło">
                </div>

                <button type="submit" class="auth-btn" id="submitBtn">Zarejestruj się</button>
            </form>

            <div class="auth-link">
                Masz już konto? <a href="logowanie.html">Zaloguj się</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const msgEl = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msgEl.className = 'message';

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!name || !email || !password || !confirmPassword) {
                msgEl.textContent = 'Wszystkie pola są wymagane!';
                msgEl.classList.add('error');
                return;
            }

            if (name.length < 3) {
                msgEl.textContent = 'Imię musi mieć co najmniej 3 znaki!';
                msgEl.classList.add('error');
                return;
            }

            if (password.length < 8) {
                msgEl.textContent = 'Hasło musi mieć co najmniej 8 znaków!';
                msgEl.classList.add('error');
                return;
            }

            if (password !== confirmPassword) {
                msgEl.textContent = 'Hasła się nie zgadzają!';
                msgEl.classList.add('error');
                return;
            }

            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('userName', data.user.name);
                    msgEl.textContent = 'Zarejestrowano! Przekierowywanie...';
                    msgEl.classList.add('success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1200);
                } else {
                    msgEl.textContent = data.message || 'Błąd rejestracji!';
                    msgEl.classList.add('error');
                }
            } catch {
                msgEl.textContent = 'Błąd połączenia!';
                msgEl.classList.add('error');
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
