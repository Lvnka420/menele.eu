<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Stream — menele.eu</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="apple-touch-icon" sizes="180x180" href="ikona/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="ikona/favicon-32x32.png">
<link rel="manifest" href="ikona/site.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<nav>
  <span class="nav-logo">
    <img src="ikona/favicon-32x32.png" alt="" class="nav-logo-icon">
    menele.eu
  </span>
  <a href="index.html">Strona główna</a>
  <a href="onas.html">O nas</a>
  <a href="logowanie.html" class="nav-cta">Logowanie</a>
</nav>

<section class="stream-container">
  <div class="section-title reveal">
    <h2>Stream TVP-MENELE</h2>
    <p>Śledź naszą transmisję na żywo</p>
  </div>

  <div class="stream-selector reveal">
    <button class="stream-button active" data-platform="twitch">Twitch</button>
    <button class="stream-button" data-platform="kick">Kick</button>
  </div>

  <div class="stream-wrapper reveal" id="streamWrapper">
    <iframe
      src="https://player.twitch.tv/?channel=lodzikk_&parent=menele.eu"
      allowfullscreen>
    </iframe>
  </div>

  <div class="stream-info reveal">
    <h3>O naszym streamie</h3>
    <p>Dołącz do nas na żywo! Transmitujemy codziennie o godzinie 20:00. Baw się dobrze wraz z TVP-MENELE!</p>
  </div>
</section>

<footer>Made by Lvnka</footer>

<script>
  document.querySelectorAll('.stream-button').forEach(btn => {
    btn.addEventListener('click', function() {
      const platform = this.dataset.platform;
      const wrapper = document.getElementById('streamWrapper');
      document.querySelectorAll('.stream-button').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      if (platform === 'twitch') {
        wrapper.innerHTML = '<iframe src="https://player.twitch.tv/?channel=lodzikk_&parent=menele.eu" allowfullscreen></iframe>';
      } else {
        wrapper.innerHTML = '<iframe src="https://player.kick.com/lodzikk_" allowfullscreen></iframe>';
      }
    });
  });

  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((e, i) => {
      if (e.isIntersecting) setTimeout(() => e.target.classList.add('visible'), i * 100);
    });
  }, { threshold: 0.1 });
  reveals.forEach(r => observer.observe(r));
</script>
</body>
</html>
