<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logowanie — menele.eu</title>
<link rel="apple-touch-icon" sizes="180x180" href="ikona/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="ikona/favicon-32x32.png">
<link rel="manifest" href="ikona/site.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-container">
  <div class="login-box">

    <div class="back-link">
      <a href="index.html">← Powrót</a>
    </div>

    <h1>Logowanie</h1>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="twoj@email.com">
      </div>
      <div class="form-group">
        <label for="password">Hasło</label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>

      <div class="loading" id="loading" style="display:none; text-align:center; padding: 12px 0;">
        <div class="spinner" style="margin: 0 auto 8px;"></div>
        <p style="font-family: var(--mono); font-size: 0.72rem; color: var(--text-faint); letter-spacing: 0.1em;">Logowanie...</p>
      </div>

      <button type="submit" class="login-btn" id="submitBtn">Zaloguj Się</button>
    </form>

    <div class="register-link">
      Nie masz konta? <a href="rejestracja.html">Zarejestruj się</a>
    </div>

  </div>
</div>

<script>
  const loginForm = document.getElementById('loginForm');
  const errorMessage = document.getElementById('errorMessage');
  const successMessage = document.getElementById('successMessage');
  const loading = document.getElementById('loading');
  const submitBtn = document.getElementById('submitBtn');

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) { errorMessage.textContent = 'Wszystkie pola są wymagane!'; return; }
    if (!email.includes('@')) { errorMessage.textContent = 'Wprowadź prawidłowy email!'; return; }

    loading.style.display = 'block';
    submitBtn.disabled = true;
    errorMessage.textContent = '';
    successMessage.textContent = '';

    try {
      const response = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await response.json();
      if (response.ok) {
        localStorage.setItem('authToken', data.token);
        localStorage.setItem('userName', data.user.name);
        successMessage.textContent = 'Logowanie udane! Przekierowywanie...';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
      } else {
        errorMessage.textContent = data.message || 'Błąd logowania!';
      }
    } catch (error) {
      errorMessage.textContent = 'Błąd połączenia z serwerem!';
    } finally {
      loading.style.display = 'none';
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
